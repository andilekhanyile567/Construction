{% extends "base.html" %}

{% block content %}
<div class="forgot-container">
    <div class="forgot-card">
        <div class="forgot-header">
            <i class="fas fa-key"></i>
            <h2>Forgot Password</h2>
            <p>Enter your email address and we'll reset your password</p>
        </div>

        <form method="POST" action="{{ url_for('forgot_password') }}" class="forgot-form">
            {% if message %}
            <div class="info-message {% if 'not found' in message %}error{% else %}success{% endif %}">
                <i class="fas {% if 'not found' in message %}fa-exclamation-triangle{% else %}fa-check-circle{% endif %}"></i>
                    {{ message }}
            </div>
            {% endif %}

            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" name="email" placeholder="Enter your registered email" required autofocus>
                <small>We'll send a reset confirmation to this email (demo: password becomes 123456)</small>
            </div>

            <button type="submit" class="btn-reset">
                <i class="fas fa-sync-alt"></i> Reset Password
            </button>

            <div class="back-link">
                <a href="{{ url_for('login') }}"><i class="fas fa-arrow-left"></i> Back to Login</a>
            </div>
        </form>
    </div>
</div>

<style>
    .forgot-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 100px);
        padding: 2rem;
    }
    .forgot-card {
        background: white;
        border-radius: 32px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        max-width: 480px;
        width: 100%;
        padding: 2rem;
        border-top: 5px solid #e67e22;
    }
    .forgot-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    .forgot-header i {
        font-size: 3rem;
        color: #e67e22;
        margin-bottom: 0.5rem;
    }
    .forgot-header h2 {
        margin: 0.5rem 0;
        color: #2c2c2c;
    }
    .forgot-header p {
        color: #777;
        font-size: 0.9rem;
    }
    .forgot-form .form-group {
        margin-bottom: 1.5rem;
    }
    .forgot-form label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.4rem;
        color: #2c2c2c;
    }
    .forgot-form label i {
        margin-right: 6px;
        color: #e67e22;
    }
    .forgot-form input {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #ddd;
        border-radius: 12px;
        font-size: 1rem;
        transition: 0.2s;
    }
    .forgot-form input:focus {
        border-color: #e67e22;
        outline: none;
        box-shadow: 0 0 0 3px rgba(230,126,34,0.1);
    }
    small {
        display: block;
        font-size: 0.7rem;
        color: #888;
        margin-top: 4px;
    }
    .info-message {
        padding: 12px 16px;
        border-radius: 12px;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.9rem;
    }
    .info-message.success {
        background: #e8f8f5;
        border-left: 4px solid #27ae60;
        color: #1e8449;
    }
    .info-message.error {
        background: #fee2e2;
        border-left: 4px solid #e74c3c;
        color: #c0392b;
    }
    .btn-reset {
        width: 100%;
        background: #e67e22;
        color: white;
        border: none;
        padding: 12px;
        font-size: 1rem;
        font-weight: bold;
        border-radius: 40px;
        cursor: pointer;
        transition: 0.2s;
        margin-top: 0.5rem;
    }
    .btn-reset:hover {
        background: #f39c12;
        transform: translateY(-2px);
    }
    .back-link {
        text-align: center;
        margin-top: 1.5rem;
    }
    .back-link a {
        color: #e67e22;
        text-decoration: none;
        font-size: 0.9rem;
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }
    .back-link a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}
